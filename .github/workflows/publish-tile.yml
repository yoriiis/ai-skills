name: Publish Tile

permissions:
  id-token: write
  contents: read

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: tesslio/publish@main
        with:
          token: ${{ secrets.TESSL_API_TOKEN }}
          path: skills/frontend-code-review
          review: "true"
          review-threshold: "50"
